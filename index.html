<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beautiful Quran Majeed - Tajweed Color Coded</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
	  
	  <!-- হালকা ইসলামিক decoration icons (pure SVG, background-এর মতো) -->
<svg id="icon1" class="decor-icon" viewBox="0 0 100 100">
  <path d="M50 10 L60 30 L90 30 L65 45 L75 70 L50 55 L25 70 L35 45 L10 30 L40 30 Z" />
</svg>

<svg id="icon2" class="decor-icon" viewBox="0 0 100 100">
  <path d="M50 10 L90 50 L50 90 L10 50 Z M50 30 L70 50 L50 70 L30 50 Z" />
</svg>

<svg id="icon3" class="decor-icon" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="40" fill="none" stroke-width="6" />
  <path d="M50 10 Q 70 30, 90 50 Q 70 70, 50 90 Q 30 70, 10 50 Q 30 30, 50 10 Z" fill="none" stroke-width="8" />
</svg>

<svg id="icon4" class="decor-icon" viewBox="0 0 100 100">
  <path d="M50 20 L80 40 L80 80 L50 100 L20 80 L20 40 Z M50 40 L65 50 L65 70 L50 80 L35 70 L35 50 Z" />
</svg>
    <header
		
      <h1>কুরআন শরীফ (তাজবীদ, কালার কোডেড)</h1>
      <div class="controls">
        <button id="night-mode">নাইট মোড</button>
        <button id="fullscreen">ফুলস্ক্রিন</button>
      </div>
    </header>

    <div class="main">
      <aside class="sidebar">
        <h2>পারা নির্বাচন করুন</h2>
        <ul id="para-list"></ul>

	<!-- 30 para list -->

      </aside>

      <section class="viewer-section">
        <div id="loading">পারা লোড হচ্ছে...</div>
        <iframe id="pdf-viewer" src="" allowfullscreen></iframe>

        <div class="para-nav">
          <button id="prev-para">পূর্ববর্তী পারা</button>
          <button id="next-para">পরবর্তী পারা</button>
        </div>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
